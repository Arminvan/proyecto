<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Extractor de Oficios - Ajustado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        #drop-zone { border: 2px dashed #007bff; padding: 40px; text-align: center; background: #f8f9fa; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Extractor de Oficios</h2>
    <div id="drop-zone">Arrastra aquí tus archivos .docx</div>
    <button onclick="processFiles()">Procesar y Descargar</button>
</div>

<script>
    let files = [];
    document.getElementById('drop-zone').addEventListener('dragover', e => e.preventDefault());
    document.getElementById('drop-zone').addEventListener('drop', e => {
        e.preventDefault();
        files = [...e.dataTransfer.files];
        alert("Archivos listos para procesar");
    });

    async function processFiles() {
        const results = [];
        for (const file of files) {
            const zip = await JSZip.loadAsync(file);
            let fullText = "";

            // Leemos header y body
            for (const path of ["word/document.xml", "word/header1.xml", "word/header2.xml"]) {
                if (zip.file(path)) fullText += (await zip.file(path).async("string")).replace(/<[^>]*>/g, " ") + " ";
            }

            // Patrones ajustados al documento de prueba
            results.push({
                "Archivo": file.name,
                "Oficio": (fullText.match(/Oficio:\s*([\d\-]+)/i) || [])[1] || "N/A",
                "RFC": (fullText.match(/R\.F\.C\.\s*:\s*([A-Z0-9]{12,13})/i) || [])[1] || "N/A",
                "Folio SIFEN": (fullText.match(/Folio SIFEN:\s*(\d+)/i) || [])[1] || "N/A",
                "Orden": (fullText.match(/Orden:\s*([A-Z0-9\/]+)/i) || [])[1] || "N/A",
                "Contribuyente": (fullText.match(/Legal de\s+([A-ZÁÉÍÓÚÑ\s]+?)(?=\sEsta Administración)/i) || [])[1]?.trim() || "N/A"
            });
        }
        
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(results), "Resultados");
        XLSX.writeFile(wb, "resultado_ajustado.xlsx");
    }
</script>
</body>
</html>
